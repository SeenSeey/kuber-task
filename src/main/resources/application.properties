quarkus.http.port=8080

app.api.limit=${APP_API_LIMIT:70}
quarkus.http.limits.max-connections=1024
app.api.timeout=${APP_API_TIMEOUT:600}

# Prometheus metrics at /q/metrics (work_active_requests and others)
quarkus.micrometer.export.prometheus.default=true
quarkus.micrometer.binder-enabled-default=true

quarkus.smallrye-openapi.enable=true
quarkus.smallrye-openapi.info.title=Quarkus Rate Limiting API
quarkus.smallrye-openapi.info.version=1.0.0
quarkus.swagger-ui.always-include=true

